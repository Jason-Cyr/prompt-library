# ClawShield Production Policy
#
# Default: ALLOW — scanners detect real threats
# Clean messages pass through; threats are blocked by scanner findings
#
# Customize the 'domains' list for your own agent's API needs.

version: "1.0"
mode: production
default_action: allow

shadow_mode: false

settings:
  max_body_size: 1048576  # 1MB
  evaluation_timeout_ms: 300
  log_level: info

scanners:
  injection:
    enabled: true
    sensitivity: high
    action: block

  pii:
    enabled: true
    action: redact
    categories:
      - credit_card
      - ssn
      - email
      - phone
      - ip_address
      - dob
      - passport
      - drivers_license
      - bank_account
      - medical_id

  secrets:
    enabled: true
    action: block
    providers:
      - aws
      - gcp
      - azure
      - github
      - gitlab
      - slack
      - stripe
      - twilio
      - sendgrid
      - mailgun
      - npm
      - pypi
      - generic

  vulnerability:
    enabled: true
    action: block
    checks:
      - sqli
      - ssrf
      - path_traversal
      - command_injection
      - xss

  malware:
    enabled: true
    action: block
    max_entropy: 7.0
    max_compression_ratio: 100

# Tool permissions — allow all (scanners handle threat detection)
tools:
  "*":
    action: allow

# Allowed domains — CUSTOMIZE THIS for your setup
# Only these domains will be reachable when the egress firewall is active
domains:
  - "api.anthropic.com"
  - "api.openai.com"
  - "generativelanguage.googleapis.com"
  - "*.googleapis.com"
  - "api.github.com"
  - "github.com"
  - "registry.npmjs.org"
  - "pypi.org"
  - "api.linear.app"
  - "linear.app"
  - "slack.com"
  - "*.slack.com"
  - "api.brave.com"
  - "wttr.in"
  - "api.open-meteo.com"
  - "docs.openclaw.ai"
